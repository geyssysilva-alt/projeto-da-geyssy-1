<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLV Modas - Tendencias 2026</title>
    <style>
        /* Configuracao global da pagina */
        body {
            background-color: rgb(0, 132, 255);
            color: aliceblue;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #080053;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        header a {
            color: aliceblue;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        header a:hover {
            text-decoration: underline;
        }

        main {
            background-color: aliceblue;
            color: rgb(24, 24, 110);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 8px;
            border: 5px solid #080053;
        }

        /* Card do Produto */
        .produto {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
            max-width: 280px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .produto img {
            width: 150px;
            height: 171px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .produto h3 {
            margin: 10px 0 5px 0;
        }

        .produto p {
            font-size: 18px;
            font-weight: bold;
            color: #080053;
            margin-bottom: 15px;
        }

        /* Botao do WhatsApp */
        button {
            background-color: #25D366; 
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <header>
        <h1>SLV Modas</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>
        <h2>Tendencias de Moda 2026</h2>
        
        <div class="produto">
            <img src="1762908517_23421.jpg" alt="Camiseta Estampada">
            <h3>Camiseta Estampada</h3>
            <p>R$ 79,99</p>
            <button id="btn-comprar">
                Comprar pelo WhatsApp (<span id="contador">0</span>)
            </button>
        </div>
    </main>

    <script>
        // Selecao dos elementos HTML
        const botao = document.querySelector("#btn-comprar");
        const textoContador = document.querySelector("#contador");
        
        let cliques = 0;

        // Configuracao do WhatsApp (Mude para o seu numero real)
        // Formato: Codigo do pais (55) + DDD + Numero (ex: 5511999999999)
        const numeroWhatsapp = "5500999999999"; 
        const mensagemTexto = "Ola! Gostaria de encomendar a Camiseta Estampada de R$ 79,99.";

      
        botao.addEventListener("click", () => {
           
            cliques++;
            textoContador.textContent = cliques;

            
            const linkZap = `https://wa.me/${numeroWhatsapp}?text=${encodeURIComponent(mensagemTexto)}`;

        
            window.open(linkZap, "_blank");
        });
    </script>
</body>
</html>
