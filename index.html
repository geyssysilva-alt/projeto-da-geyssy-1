<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLV Modas - Tendências 2026</title>
    <style>
        /* Configuração global do corpo da página */
        body {
            background-color: rgb(0, 132, 255);
            color: aliceblue;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 16px;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #080053;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        header a {
            color: aliceblue;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        header a:hover {
            text-decoration: underline;
        }

        main {
            background-color: aliceblue;
            color: rgb(24, 24, 110);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 8px;
            border: 5px solid #080053;
        }

        .produto {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: white;
        }

        img {
            width: 150px;
            height: 171px;
            object-fit: cover;
            border-radius: 8px;
        }

        button {
            background-color: #25D366; 
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background-color: #128C7E;
        }
    </style>
</head>
<body>

    <header>
        <h1>SLV Modas</h1>
        <nav>
            <a href="#">Início</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <main>
        <h2>Tendências de Moda 2026</h2>
        
        <img src="1762908517_23421.jpg" alt="Camiseta Estampada">
        
        <div class="produto">
            <h3>Camiseta Estampada</h3>
            <p>R$ 79,99</p>
            <button>Comprar pelo WhatsApp (<span id="contador">0</span>)</button>
        </div>
    </main>

    <script>
        const botao = document.querySelector("button");
        const textoContador = document.querySelector("#contador");
        let cliques = 0;

        botao.addEventListener("click", botaoClicado);

        function botaoClicado() {
            console.log("Fui clicado!");
            cliques++;
            textoContador.textContent = cliques;
        }
    </script>
</body>
</html>
